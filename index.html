<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>
(function(){
  var lang=(navigator.language||'en').slice(0,2);
  var supported=['en','fr','de','es','it','zh'];
  var target=supported.includes(lang)?lang:'en';
  window.location.href='/'+target+'/';
})();
</script>
</head>
<body></body>
</html>
